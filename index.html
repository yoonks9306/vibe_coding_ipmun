<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAVA 12기 바이브코딩 교보재</title>
  <link rel="icon" type="image/png" href="./favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --bg2: #141414;
      --bg3: #1a1a1a;
      --panel: rgba(255, 255, 255, 0.03);
      --border: #2a2a2a;
      --text: #ece7de;
      --text-dim: #9a9388;
      --accent: #f5a623;
      --accent2: #ff7a1a;
      --green: #4ade80;
      --red: #f87171;
      --sidebar-w: 280px;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: radial-gradient(circle at top, rgba(245,166,35,0.08), transparent 28%), var(--bg);
      color: var(--text);
      font-family: "Noto Sans KR", sans-serif;
      line-height: 1.8;
      overflow-x: hidden;
    }

    #landing {
      min-height: 100vh;
      display: grid;
      place-items: center;
      position: relative;
      padding: 32px 20px;
      overflow: hidden;
    }

    #landing::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 85%);
      pointer-events: none;
    }

    .landing-inner {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 760px;
    }

    .landing-tag {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 0.22em;
      color: var(--accent);
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 0.55s ease forwards 0.1s;
    }

    .landing-title {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(68px, 12vw, 160px);
      line-height: 0.92;
      letter-spacing: 0.02em;
      margin-bottom: 18px;
      opacity: 0;
      animation: fadeUp 0.65s ease forwards 0.25s;
    }

    .landing-title .accent { color: var(--accent); display: block; }

    .landing-sub {
      max-width: 560px;
      margin: 0 auto 36px;
      font-size: 16px;
      color: var(--text-dim);
      opacity: 0;
      animation: fadeUp 0.65s ease forwards 0.4s;
    }

    .landing-sub strong { color: var(--text); }

    .btn-start {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), #ffc24f);
      color: #141414;
      font-family: "Noto Sans KR", sans-serif;
      font-weight: 800;
      font-size: 22px;
      padding: 18px 40px;
      box-shadow: 0 14px 35px rgba(245, 166, 35, 0.28);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      opacity: 0;
      animation: fadeUp 0.65s ease forwards 0.55s;
    }

    .btn-start:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, var(--accent2), #ffb347);
      box-shadow: 0 18px 40px rgba(245, 166, 35, 0.34);
    }

    #app { display: none; min-height: 100vh; }
    #app.visible { display: flex; }

    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: rgba(20, 20, 20, 0.9);
      border-right: 1px solid var(--border);
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      padding: 32px 0;
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }

    .sidebar-logo {
      display: block;
      padding: 0 28px;
      margin-bottom: 28px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.16em;
    }

    .nav-item {
      display: flex;
      gap: 12px;
      padding: 13px 28px;
      cursor: pointer;
      color: var(--text-dim);
      border-left: 2px solid transparent;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      font-size: 13px;
    }

    .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .nav-item.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(245, 166, 35, 0.06);
    }
    .nav-item.done { color: var(--green); }
    .nav-item.done .nav-num { background: var(--green); color: #111; }
    .nav-item.active .nav-num { background: var(--accent); color: #111; }

    .nav-num {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      background: var(--border);
      color: var(--text-dim);
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      font-weight: 700;
      border-radius: 6px;
      margin-top: 1px;
    }

    .sidebar-progress {
      margin: 28px 28px 0;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .progress-label {
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.35s ease;
    }

    .content {
      flex: 1;
      max-width: 920px;
      padding: 56px 64px 80px;
      animation: fadeIn 0.3s ease;
    }

    .section-tag {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .section-title {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(40px, 5vw, 62px);
      line-height: 0.98;
      letter-spacing: 0.02em;
      margin-bottom: 32px;
    }

    .section-title .highlight { color: var(--accent); }

    p {
      margin-bottom: 18px;
      font-size: 15px;
      color: var(--text);
    }

    strong { font-weight: 700; color: var(--text); }
    h3 { margin: 28px 0 12px; font-size: 19px; }
    code {
      font-family: "JetBrains Mono", monospace;
      background: rgba(245,166,35,0.11);
      color: var(--accent);
      border: 1px solid rgba(245,166,35,0.2);
      border-radius: 6px;
      padding: 2px 6px;
      font-size: 12px;
    }

    .divider { border: 0; border-top: 1px solid var(--border); margin: 32px 0; }

    .term-grid,
    .tool-row {
      display: grid;
      gap: 16px;
      margin: 24px 0;
    }

    .term-grid { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .tool-row { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }

    .term-card,
    .tool-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .term-name {
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      color: var(--accent);
      margin-bottom: 8px;
      font-weight: 700;
    }

    .term-desc,
    .tool-card p {
      font-size: 13px;
      color: var(--text-dim);
      margin: 0;
      line-height: 1.75;
    }

    .tool-card-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .tool-badge {
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--accent);
      background: rgba(245,166,35,0.12);
      border-radius: 999px;
      padding: 4px 8px;
    }

    .tool-name { font-size: 17px; font-weight: 700; }

    .pros-cons-label {
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.16em;
      margin: 14px 0 6px;
    }

    .pros-cons-label.pro { color: var(--green); }
    .pros-cons-label.con { color: var(--red); }

    .pros-cons { list-style: none; }
    .pros-cons li {
      position: relative;
      padding-left: 14px;
      color: var(--text-dim);
      font-size: 13px;
      margin-bottom: 6px;
      line-height: 1.65;
    }
    .pros-cons li.pro::before,
    .pros-cons li.con::before {
      position: absolute;
      left: 0;
      top: 0;
      font-weight: 700;
    }
    .pros-cons li.pro::before { content: "+"; color: var(--green); }
    .pros-cons li.con::before { content: "-"; color: var(--red); }

    .callout {
      margin: 24px 0;
      padding: 18px 20px;
      border-radius: 16px;
      border: 1px solid rgba(245,166,35,0.18);
      background: rgba(245,166,35,0.06);
    }

    .callout.warning {
      border-color: rgba(248,113,113,0.2);
      background: rgba(248,113,113,0.06);
    }

    .callout.tip {
      border-color: rgba(74,222,128,0.2);
      background: rgba(74,222,128,0.06);
    }

    .callout-label {
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.16em;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .callout.warning .callout-label { color: var(--red); }
    .callout.tip .callout-label { color: var(--green); }
    .callout p { margin: 0; font-size: 14px; }

    .step-list { margin: 22px 0; }
    .step-item {
      display: flex;
      gap: 16px;
      margin-bottom: 18px;
      align-items: flex-start;
    }

    .step-num {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--accent);
      color: #111;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .step-content { font-size: 14px; }

    .bullet-list {
      list-style: none;
      margin: 18px 0;
    }

    .bullet-list li {
      position: relative;
      padding-left: 18px;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .bullet-list li::before {
      content: "▸";
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    .prompt-box {
      margin: 18px 0;
      padding: 20px 22px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #0a0a0a;
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      color: #d5d0c8;
      white-space: pre-wrap;
      line-height: 1.75;
      box-shadow: var(--shadow);
    }

    .prompt-box::before {
      content: "PROMPT";
      display: block;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--accent);
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .screenshot-wrap {
      margin: 28px 0;
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      background: var(--bg3);
      box-shadow: var(--shadow);
    }

    .screenshot-wrap img {
      display: block;
      width: 100%;
      background: #101010;
    }

    .screenshot-caption {
      padding: 14px 18px 18px;
      font-size: 12px;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
    }

    .screenshot-legend {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .legend-item {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      font-size: 12px;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .btn-next-wrap {
      margin-top: 48px;
      padding-top: 28px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    .btn-next-label {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }

    .btn-next {
      border: none;
      border-radius: 999px;
      background: var(--accent);
      color: #111;
      font-family: "Noto Sans KR", sans-serif;
      font-weight: 800;
      font-size: 15px;
      padding: 14px 26px;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .btn-next:hover { transform: translateY(-2px); background: var(--accent2); }
    .btn-finish { background: var(--green); }
    .btn-finish:hover { background: #7cf0a5; }

    #done-screen {
      min-height: 100vh;
      display: none;
      place-items: center;
      text-align: center;
      padding: 32px 20px;
    }

    #done-screen.visible { display: grid; }

    .done-inner { max-width: 640px; }
    .done-title {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(56px, 8vw, 100px);
      line-height: 0.95;
      margin-bottom: 18px;
    }
    .done-title span { color: var(--green); }

    .done-sub {
      color: var(--text-dim);
      margin-bottom: 30px;
      font-size: 15px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: #2f2f2f; border-radius: 999px; }
    ::-webkit-scrollbar-track { background: transparent; }

    @media (max-width: 900px) {
      .sidebar { display: none; }
      .content { padding: 36px 22px 64px; }
    }
  </style>
</head>
<body>
  <section id="landing">
    <div class="landing-inner">
      <div class="landing-tag">VIBE CODING 101</div>
      <h1 class="landing-title">바이브코딩.<span class="accent">"진짜"</span>어렵지 않습니다.</h1>
      <p class="landing-sub">
        <strong>Disclaimer:</strong> 아래는 비개발자가 마음대로 적어놓은<br>
        매우 허접한 정보임을 미리 밝힙니다.<br><br><strong>KAVA 12기 교육생들을 대상으로 만들어졌습니다.</strong>


      </p>
      <button class="btn-start" id="start-button" type="button">시작!</button>
    </div>
  </section>

  <div id="app">
    <nav class="sidebar">
      <span class="sidebar-logo">VIBE CODING 101</span>
      <div class="nav-item active" data-index="0"><span class="nav-num">1</span><span>기본 개념 및 용어 정리</span></div>
      <div class="nav-item" data-index="1"><span class="nav-num">2</span><span>ㅇㅋ 그래서 AI한테 어떻게 일 시킴?</span></div>
      <div class="nav-item" data-index="2"><span class="nav-num">3</span><span>개념 실무편, 그리고 유념할 사항들</span></div>
      <div class="nav-item" data-index="3"><span class="nav-num">4</span><span>실습 예제</span></div>
      <div class="nav-item" data-index="4"><span class="nav-num">5</span><span>드리고 싶은 말</span></div>
      <div class="sidebar-progress">
        <div class="progress-label">PROGRESS</div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      </div>
    </nav>
    <main class="content" id="content-area"></main>
  </div>

  <section id="done-screen">
    <div class="done-inner">
      <div class="done-title">수고하셨습니다.<br><span>계속 만들어보세요.</span></div>
      <p class="done-sub">막히면 뭐다? AI한테 물어본다~</p>
      <button class="btn-start" id="restart-button" type="button" style="opacity:1;animation:none;">처음부터 다시</button>
    </div>
  </section>

  <script>
    const sections = [
      `
      <div class="section-tag">CHAPTER 01</div>
      <h1 class="section-title">기본 개념 및<br><span class="highlight">용어 정리</span></h1>
      <div class="callout tip">
        <div class="callout-label">저자는 누구인가요?</div>
        <p><strong>윤권상 (James Yoon)</strong><br>
        비개발자 출신 생명과학돌이, 영생 예찬론자. IT 경험은?<br>
        -. 前 블록체인 서비스 창업 해본사람 - 웹사이트 만드는데 5개월 걸린 멍청이<br>
        -. 前 AI 상장사에서 영업, 전략기획 해본 사람<br>
        -. 前 미국에서 본업 외 웹사이트 제작, 이메일 마케팅, 영상 제작, 음악 제작 부업, 바텐딩까지하며 밥값 학비 벌던 불쌍한 놈<br>
        -. 現 6월에 뭐하고 있을지 맨날 걱정하는 사람</p>
      </div>
      <p><strong>바이브코딩:</strong> 프로그래밍 언어 (C++, Java, Python 등)이 아닌 <strong>자연어 (우리가 쓰는 언어)</strong>로 AI에게 코딩 작업을 맡기는 행위</p>
      

      <h3>웹에 서비스를 올리려면?</h3>
      <p>여러분이 원하는 무언가를 인터넷에 올리려면, 통상 아래 요소들이 필요합니다.</p>
      <div class="term-grid">
        <div class="term-card"><div class="term-name">코드</div><div class="term-desc">서비스가 어떻게 동작할지를 적어놓는 명령어</div></div>
        <div class="term-card"><div class="term-name">서버</div><div class="term-desc">코드가 실제로 돌아가는 공간.</div></div>
        <div class="term-card"><div class="term-name">호스팅</div><div class="term-desc">그 서버와 코드를 인터넷 상에 올려주는 서비스</div></div>
        <div class="term-card"><div class="term-name">도메인</div><div class="term-desc"><code>naver.com</code> 같은 고유 집주소. </div></div>
        <div class="term-card"><div class="term-name">DB (데이터베이스)</div><div class="term-desc">실행규칙, 회원 정보, 게시글, 댓글 같은 데이터를 저장하는 공간</div></div>
      </div>

      <div class="callout">
        <div class="callout-label">좋은 소식!</div>
        <p>이 좋은 세상에선 (여러분이 돈을 벌 목적으로 일을 크게 벌리실 것이 아니면) 하나 빼고 위 모든 것이 <strong>무료</strong>입니다.</p>
      </div>

      <hr class="divider">
      <h3>위에서 뭐가 유료에요?</h3>
      <div class="term-grid">
        <div class="term-card"><div class="term-name">Vercel</div><div class="term-desc"><code>호스팅</code> <code>서버</code> <code>도메인</code> 을 무료로 해결해줍니다.</div></div>
        <div class="term-card"><div class="term-name">Supabase</div><div class="term-desc"><code>DB</code>를 무료로 해결해줍니다.</div></div>
        <div class="term-card"><div class="term-name">Claude / GPT (Codex) / Gemini</div><div class="term-desc"><code>코드</code>를 해결해줄 놈들. 우선 3개를 모두 한달만 결제해보길 추천합니다.</div></div>
      </div>

       <div class="callout">
        <div class="callout-label">꼭 3개를 다 써야 하나요? ㅠ</div>
